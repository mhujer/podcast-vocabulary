services:
  app:
    build: .
    user: '${UID}:${GID}'
    ports:
      - '127.0.0.1:3000:3000'
      - '127.0.0.1:9001:9001'
    volumes:
      - .:/podcast-vocabulary
      - ${HOME}/.claude:/home/node/.claude
      - ${HOME}/.claude.json:/home/node/.claude.json
      - ${HOME}/.gitconfig:/home/node/.gitconfig:ro
      - ${HOME}/.npm:/home/node/.npm
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    env_file:
      - .env.local
